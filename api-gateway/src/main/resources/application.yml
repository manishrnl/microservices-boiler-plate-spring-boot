server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: payment-services
              uri: lb://payment-services
              predicates:
                - Path=/api/payments/**
            - id: notification-services
              uri: lb://notification-services
              predicates:
                - Path=/api/notifications/**
            - id: ai-services
              uri: lb://ai-services
              predicates:
                - Path=/api/ai/**
            - id: security-services
              uri: lb://security-services
              predicates:
                - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
