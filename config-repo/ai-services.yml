server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ai-services
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3.2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
