name: enterprise-microservices-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: ms-postgres
    environment:
      POSTGRES_DB: microservices_db
      POSTGRES_USER: microservice_user
      POSTGRES_PASSWORD: microservice_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microservice_user -d microservices_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.1.0
    container_name: ms-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    container_name: ms-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    container_name: ms-config-server
    environment:
      SERVER_PORT: 8888
      CONFIG_GIT_URI: https://github.com/manishrnl/microservices-boiler-plate-config-server.git
      CONFIG_GIT_DEFAULT_LABEL: main
    ports:
      - "8888:8888"
  discovery-client:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: discovery-client
    container_name: ms-discovery-client
    environment:
      SERVER_PORT: 8761
      EUREKA_INSTANCE_HOSTNAME: discovery-client
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: ms-api-gateway
    environment:
      SERVER_PORT: 8080
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-client:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_started
      discovery-client:
        condition: service_started

  payment-services:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-services
    container_name: ms-payment-services
    environment:
      SERVER_PORT: 8081
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-client:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservices_db
      SPRING_DATASOURCE_USERNAME: microservice_user
      SPRING_DATASOURCE_PASSWORD: microservice_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_EVENTS_TOPIC: payment-events
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
      discovery-client:
        condition: service_started

  notification-services:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-services
    container_name: ms-notification-services
    environment:
      SERVER_PORT: 8082
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-client:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservices_db
      SPRING_DATASOURCE_USERNAME: microservice_user
      SPRING_DATASOURCE_PASSWORD: microservice_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_EVENTS_TOPIC: payment-events
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
      discovery-client:
        condition: service_started

  ai-services:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ai-services
    container_name: ms-ai-services
    environment:
      SERVER_PORT: 8083
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-client:8761/eureka/
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: llama3.2
    ports:
      - "8083:8083"
    depends_on:
      ollama:
        condition: service_started
      config-server:
        condition: service_started
      discovery-client:
        condition: service_started

  security-services:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: security-services
    container_name: ms-security-services
    environment:
      SERVER_PORT: 8084
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-client:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microservices_db
      SPRING_DATASOURCE_USERNAME: microservice_user
      SPRING_DATASOURCE_PASSWORD: microservice_password
      MAX_SESSIONS_PER_USER: 5
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_started
      discovery-client:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  ollama-data:
